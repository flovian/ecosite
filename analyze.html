<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Analyze Location - EcoSite</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="margin:0; font-family:'Montserrat', sans-serif; color:white; background:#1E3D2D; display:flex; flex-direction:column; min-height:100vh;">

  <!-- Navbar -->
  <!-- Navbar -->
<div style="position:sticky; top:0; background:#2E8B57; display:flex; align-items:center; justify-content:space-between; padding:10px 20px; z-index:100;">
  <div style="display:flex; align-items:center;">
    <img src="/static/logo.png" alt="Logo" style="height:40px; margin-right:10px;">
    <span style="font-weight:700; font-size:24px;">EcoSite</span>
  </div>
  <div>
    <a href="/" style="color:white; margin:0 10px; text-decoration:none;">Home</a>
    <a href="/about" style="color:white; margin:0 10px; text-decoration:none;">About</a>
    <a href="/analyze" style="color:white; margin:0 10px; text-decoration:none;">Analyze Location</a>
  </div>
</div>

  <!-- Form Section -->
  <div style="flex:1; display:flex; justify-content:center; align-items:center; padding:50px 20px;">
    <form action="/results" method="POST" style="background:#ffffff; color:#2E8B57; max-width:500px; width:100%; padding:30px; border-radius:10px;">
      <h1 style="text-align:center; margin-bottom:30px;">Analyze Your Location</h1>

      <label>Location Name:</label>
      <input type="text" name="location" required style="width:100%; padding:10px; margin-bottom:20px; border-radius:5px; border:1px solid #2E8B57;">

      <label>Distance from Water (km):</label>
      <input type="number" name="water_distance" required style="width:100%; padding:10px; margin-bottom:20px; border-radius:5px; border:1px solid #2E8B57;">

      <label>Distance from Forest (km):</label>
      <input type="number" name="forest_distance" required style="width:100%; padding:10px; margin-bottom:20px; border-radius:5px; border:1px solid #2E8B57;">

      <label>Distance from Residential Area (km):</label>
      <input type="number" name="residential_distance" required style="width:100%; padding:10px; margin-bottom:20px; border-radius:5px; border:1px solid #2E8B57;">

      <button type="submit" style="background:#2E8B57; color:white; padding:15px 30px; font-weight:bold; border:none; border-radius:5px; cursor:pointer; width:100%;">Analyze</button>
    </form>
  </div>

  <!-- Footer -->
  <div style="background:#2E8B57; padding:20px; text-align:center;">
    <p>© 2026 EcoSite | Promoting Sustainable Industrial Development</p>
  </div>
</body>
</html>
